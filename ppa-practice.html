<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veyra · PPA Practice</title>
  <style>
    :root{
      --navy:#050b14;
      --navy2:#07111f;
      --cream:#f7f1e8;
      --card:#fffaf2;
      --line:#e4d4b7;
      --gold:#c99a3d;
      --gold2:#e4bd68;
      --muted:#667085;
      --green:#08774b;
      --red:#b42318;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:var(--navy2)}
    header{background:var(--navy);color:white;padding:28px 36px;border-bottom:1px solid var(--gold)}
    .brand{font-family:Georgia,serif;font-size:46px;line-height:.9}
    .tag{letter-spacing:6px;color:var(--gold2);font-size:13px;margin-top:8px}
    main{max-width:1120px;margin:34px auto;padding:0 18px}
    .panel{background:white;border:1px solid var(--line);border-radius:24px;padding:30px;margin-bottom:22px;box-shadow:0 18px 45px rgba(7,17,31,.06)}
    .eyebrow{letter-spacing:6px;color:var(--gold);font-weight:800;font-size:13px;text-transform:uppercase}
    h1{font-family:Georgia,serif;font-size:54px;margin:12px 0 8px}
    h2{font-size:28px;margin:0 0 18px}
    p{font-size:18px;line-height:1.45;color:#1d2939}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0}
    .kpi{border:1px solid var(--line);border-radius:18px;padding:20px;background:#fffdf8}
    .kpi small{display:block;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:800;font-size:12px}
    .kpi b{display:block;font-size:32px;margin-top:8px}
    button{appearance:none;border:1px solid var(--gold);border-radius:14px;padding:14px 22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
    .gold{background:linear-gradient(180deg,#efc96d,#c79431);color:#07111f}
    .dark{background:var(--navy2);color:white}
    .ghost{background:white;color:var(--navy2)}
    .btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .question-title{font-size:26px;margin:6px 0 20px}
    .meta{color:var(--gold);font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:13px}
    .option{display:block;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:12px 0;background:#fffdf8;font-size:18px}
    .option input{margin-right:10px;transform:scale(1.2)}
    .progress{height:10px;background:#efe5d3;border-radius:99px;overflow:hidden;margin:18px 0}
    .bar{height:100%;background:var(--gold);width:0}
    .timer{float:right;background:var(--navy2);color:white;border:1px solid var(--gold);border-radius:16px;padding:16px 26px;font-size:30px;font-weight:900}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border-bottom:1px solid var(--line);padding:12px;text-align:left}
    th{background:#fff4dc;color:#5d4823;text-transform:uppercase;font-size:12px;letter-spacing:1px}
    .ok{color:var(--green);font-weight:900}
    .bad{color:var(--red);font-weight:900}
    .review{border-top:1px solid var(--line);padding:18px 0}
    .hidden{display:none}
    @media(max-width:800px){
      h1{font-size:40px}
      .grid{grid-template-columns:1fr}
      .timer{float:none;display:inline-block;margin-top:12px}
    }
  </style>
</head>
<body>
<header>
  <div class="brand">Veyra</div>
  <div class="tag">PILOT INTELLIGENCE</div>
</header>

<main>
  <section id="startPanel" class="panel">
    <div class="eyebrow">PPA Practice Test</div>
    <h1>Simulacro PPA</h1>
    <p>Práctica conectada a Supabase. Carga preguntas activas desde la tabla <b>training_questions</b>.</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:22px 0">
      <label>
        <b>Nombre del estudiante</b>
        <input id="studentName" placeholder="Nombre completo" style="width:100%;margin-top:8px;padding:14px;border:1px solid #e4d4b7;border-radius:12px;font-size:16px">
      </label>
      <label>
        <b>Curso / grupo</b>
        <input id="studentCourse" placeholder="Ej. MC 02" style="width:100%;margin-top:8px;padding:14px;border:1px solid #e4d4b7;border-radius:12px;font-size:16px">
      </label>
    </div>

    <div class="grid">
      <div class="kpi"><small>Licencia</small><b>PPA</b></div>
      <div class="kpi"><small>Preguntas</small><b id="availableCount">—</b></div>
      <div class="kpi"><small>Tiempo</small><b>45 min</b></div>
      <div class="kpi"><small>Fuente</small><b>Supabase</b></div>
    </div>

    <p id="loadStatus">Consultando banco de preguntas...</p>
    <div class="btns">
      <button class="gold" onclick="startPractice()">Iniciar práctica PPA</button>
      <button class="ghost" onclick="location.href='/'">Volver a Veyra</button>
    </div>
  </section>

  <section id="examPanel" class="panel hidden">
    <div class="timer" id="timer">45:00</div>
    <div class="eyebrow">Pregunta <span id="qNumber">1</span> de <span id="qTotal">0</span></div>
    <div class="progress"><div class="bar" id="progressBar"></div></div>
    <div class="meta" id="qMeta"></div>
    <h2 class="question-title" id="qText"></h2>
    <div id="options"></div>
    <div class="btns">
      <button class="ghost" onclick="prevQuestion()">Anterior</button>
      <button class="dark" onclick="nextQuestion()">Siguiente</button>
      <button class="gold" onclick="finishPractice()">Finalizar</button>
    </div>
  </section>

  <section id="resultPanel" class="panel hidden"></section>
</main>

<script>
const SUPABASE_URL = "https://japjyiccjwnhbfpwqtti.supabase.co";
const SUPABASE_KEY = "sb_publishable_d0I6KVZFmyxg4EiyRExVNw_HoeDHPOs";
const TIMER_SECONDS = 45 * 60;

let questionBank = [];
let questions = [];
let answers = {};
let currentIndex = 0;
let endTimeMs = null;
let startTimeMs = null;
let timerInterval = null;

async function fetchQuestions(){
  const url = SUPABASE_URL + "/rest/v1/training_questions?license=eq.PPA&active=eq.true&select=question_code,license,category,question,option_a,option_b,option_c,option_d,option_e,correct_answer,explanation&order=question_code.asc";
  const res = await fetch(url, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Accept": "application/json"
    }
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error("HTTP " + res.status + " · " + text);
  }
  const rows = await res.json();
  return rows.map(r => {
    const options = [];
    if(r.option_a) options.push({key:"A", text:r.option_a});
    if(r.option_b) options.push({key:"B", text:r.option_b});
    if(r.option_c) options.push({key:"C", text:r.option_c});
    if(r.option_d) options.push({key:"D", text:r.option_d});
    if(r.option_e) options.push({key:"E", text:r.option_e});
    return {
      id:r.question_code,
      category:r.category || "Sin categoría",
      question:r.question,
      options,
      correct:r.correct_answer,
      explanation:r.explanation || ""
    };
  });
}

function shuffle(arr){
  const copy = [...arr];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

async function init(){
  const status = document.getElementById("loadStatus");
  try{
    questionBank = await fetchQuestions();
    document.getElementById("availableCount").textContent = questionBank.length;
    status.innerHTML = '<span class="ok">Banco conectado. Preguntas activas: ' + questionBank.length + '</span>';
  }catch(e){
    document.getElementById("availableCount").textContent = "0";
    status.innerHTML = '<span class="bad">No se pudo conectar con Supabase.</span><br><small>' + e.message + '</small>';
  }
}

function remapQuestionOptions(q){
  const letters = ["A","B","C","D","E"];
  const shuffledOptions = shuffle(q.options).map((opt, index) => ({
    key: letters[index],
    text: opt.text,
    originalKey: opt.key
  }));
  const correctOption = shuffledOptions.find(opt => opt.originalKey === q.correct);
  return {
    ...q,
    options: shuffledOptions,
    originalCorrect: q.correct,
    correct: correctOption ? correctOption.key : q.correct
  };
}

function startPractice(){
  if(!questionBank.length){
    alert("No hay preguntas cargadas desde Supabase.");
    return;
  }
  questions = shuffle(questionBank)
    .slice(0, Math.min(50, questionBank.length))
    .map(remapQuestionOptions);

  answers = {};
  currentIndex = 0;
  startTimeMs = Date.now();
  endTimeMs = startTimeMs + TIMER_SECONDS * 1000;
  localStorage.setItem("veyra_ppa_practice_timer", JSON.stringify({start:startTimeMs,end:endTimeMs,active:true}));

  document.getElementById("startPanel").classList.add("hidden");
  document.getElementById("resultPanel").classList.add("hidden");
  document.getElementById("examPanel").classList.remove("hidden");

  renderQuestion();
  updateTimer();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

function renderQuestion(){
  const q = questions[currentIndex];
  document.getElementById("qNumber").textContent = currentIndex + 1;
  document.getElementById("qTotal").textContent = questions.length;
  document.getElementById("qMeta").textContent = q.id + " · " + q.category;
  document.getElementById("qText").textContent = q.question;
  document.getElementById("progressBar").style.width = (((currentIndex + 1) / questions.length) * 100) + "%";

  document.getElementById("options").innerHTML = q.options.map(o => `
    <label class="option">
      <input type="radio" name="answer" value="${o.key}" ${answers[q.id]===o.key ? "checked" : ""} onchange="answers['${q.id}']='${o.key}'">
      <b>${o.key}.</b> ${o.text}
    </label>
  `).join("");
}

function nextQuestion(){
  if(currentIndex < questions.length - 1){
    currentIndex++;
    renderQuestion();
  }
}

function prevQuestion(){
  if(currentIndex > 0){
    currentIndex--;
    renderQuestion();
  }
}

function updateTimer(){
  const saved = localStorage.getItem("veyra_ppa_practice_timer");
  if(saved){
    try{
      const t = JSON.parse(saved);
      if(t.active && t.end) endTimeMs = Number(t.end);
    }catch(e){}
  }

  let remaining = Math.max(0, Math.ceil((endTimeMs - Date.now()) / 1000));
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById("timer").textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

  if(remaining <= 0){
    finishPractice();
  }
}


function trainingLevel(score){
  if(score >= 90) return "Alto desempeño";
  if(score >= 75) return "Preparación adecuada";
  if(score >= 60) return "Requiere refuerzo";
  return "Refuerzo prioritario";
}

function buildCategorySummary(details){
  const byCat = {};
  details.forEach(d => {
    byCat[d.category] ||= {total:0, correct:0, failed:0, score:0};
    byCat[d.category].total++;
    if(d.isCorrect) byCat[d.category].correct++;
    else byCat[d.category].failed++;
  });
  Object.keys(byCat).forEach(cat => {
    const x = byCat[cat];
    x.score = x.total ? Math.round((x.correct / x.total) * 100) : 0;
  });
  return byCat;
}

async function saveTrainingAttempt(payload){
  const url = SUPABASE_URL + "/rest/v1/training_attempts";
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    },
    body: JSON.stringify(payload)
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error("HTTP " + res.status + " · " + text);
  }
  return await res.json();
}


async function finishPractice(){
  clearInterval(timerInterval);
  localStorage.removeItem("veyra_ppa_practice_timer");

  if(!questions.length) return;

  const details = questions.map(q => {
    const marked = answers[q.id] || "";
    const markedOption = q.options.find(o => o.key === marked);
    const correctOption = q.options.find(o => o.key === q.correct);
    return {
      id: q.id,
      category: q.category,
      question: q.question,
      marked,
      markedText: markedOption ? markedOption.text : "Sin respuesta",
      correct: q.correct,
      correctText: correctOption ? correctOption.text : "",
      isCorrect: marked === q.correct,
      explanation: q.explanation
    };
  });

  const correct = details.filter(d => d.isCorrect).length;
  const score = Math.round((correct / details.length) * 100);
  const level = trainingLevel(score);
  const usedSeconds = startTimeMs ? Math.max(0, Math.round((Date.now() - startTimeMs) / 1000)) : null;
  const categorySummary = buildCategorySummary(details);
  const failedDetails = details.filter(d => !d.isCorrect);

  const catRows = Object.entries(categorySummary).map(([cat,v]) => {
    return `<tr><td>${cat}</td><td>${v.correct}/${v.total}</td><td>${v.score}%</td></tr>`;
  }).join("");

  const failed = failedDetails.map(d => `
    <div class="review">
      <div class="meta">${d.id} · ${d.category}</div>
      <h3>${d.question}</h3>
      <p>Marcaste: <span class="bad">${d.marked || "Sin respuesta"}</span> · Correcta: <span class="ok">${d.correct}</span></p>
      <p><b>Explicación:</b> ${d.explanation}</p>
    </div>
  `).join("") || '<p class="ok">No hubo preguntas falladas.</p>';

  const studentName = (document.getElementById("studentName")?.value || "").trim();
  const studentCourse = (document.getElementById("studentCourse")?.value || "").trim();

  document.getElementById("examPanel").classList.add("hidden");
  const resultPanel = document.getElementById("resultPanel");
  resultPanel.classList.remove("hidden");
  resultPanel.innerHTML = `
    <div class="eyebrow">Resultado final</div>
    <h1>${score}%</h1>
    <p id="saveStatus">Guardando intento en Supabase...</p>
    <div class="grid">
      <div class="kpi"><small>Correctas</small><b>${correct}/${details.length}</b></div>
      <div class="kpi"><small>Nivel</small><b>${level}</b></div>
      <div class="kpi"><small>Banco</small><b>Supabase</b></div>
      <div class="kpi"><small>Licencia</small><b>PPA</b></div>
    </div>
    <h2>Desempeño por materia</h2>
    <table><thead><tr><th>Materia</th><th>Correctas</th><th>Resultado</th></tr></thead><tbody>${catRows}</tbody></table>
    <h2 style="margin-top:30px">Retroalimentación</h2>
    ${failed}
    <div class="btns">
      <button class="gold" onclick="location.reload()">Repetir</button>
      <button class="ghost" onclick="location.href='/'">Volver a Veyra</button>
    </div>
  `;

  const payload = {
    student_name: studentName || null,
    course: studentCourse || null,
    license: "PPA",
    practice_type: "PPA Practice Test",
    score,
    correct_count: correct,
    total_questions: details.length,
    time_used_seconds: usedSeconds,
    level_result: level,
    category_summary: categorySummary,
    failed_questions: failedDetails,
    answer_detail: details
  };

  try{
    await saveTrainingAttempt(payload);
    const st = document.getElementById("saveStatus");
    if(st) st.innerHTML = '<span class="ok">Intento guardado correctamente en Supabase.</span>';
  }catch(e){
    const st = document.getElementById("saveStatus");
    if(st) st.innerHTML = '<span class="bad">No se pudo guardar el intento en Supabase.</span><br><small>' + e.message + '</small>';
    console.warn("Training attempt save error", e);
  }
}

document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && endTimeMs) updateTimer();
});
window.addEventListener("focus", () => { if(endTimeMs) updateTimer(); });
window.addEventListener("pageshow", () => { if(endTimeMs) updateTimer(); });
document.addEventListener("touchstart", () => { if(endTimeMs) updateTimer(); }, {passive:true});

init();
</script>
</body>
