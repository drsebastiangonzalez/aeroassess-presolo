<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veyra · Training Dashboard</title>
<style>
:root{--navy:#050b14;--cream:#f7f1e8;--line:#e4d4b7;--gold:#c99a3d;--gold2:#e4bd68;--muted:#667085;--green:#08774b;--red:#b42318;--orange:#b7791f}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:#07111f}
header{background:var(--navy);color:white;padding:28px 36px;border-bottom:1px solid var(--gold)}
.brand{font-family:Georgia,serif;font-size:46px;line-height:.9}
.tag{letter-spacing:6px;color:var(--gold2);font-size:13px;margin-top:8px}
main{max-width:1260px;margin:34px auto;padding:0 18px}
.panel{background:white;border:1px solid var(--line);border-radius:24px;padding:28px;margin-bottom:22px;box-shadow:0 18px 45px rgba(7,17,31,.06)}
.eyebrow{letter-spacing:6px;color:var(--gold);font-weight:800;font-size:13px;text-transform:uppercase}
h1{font-family:Georgia,serif;font-size:50px;margin:12px 0 8px}
h2{font-size:26px;margin:0 0 16px}
p{font-size:17px;line-height:1.45;color:#1d2939}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}
.kpi{border:1px solid var(--line);border-radius:18px;padding:20px;background:#fffdf8}
.kpi small{display:block;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:800;font-size:12px}
.kpi b{display:block;font-size:30px;margin-top:8px}
button{appearance:none;border:1px solid var(--gold);border-radius:12px;padding:12px 18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.gold{background:linear-gradient(180deg,#efc96d,#c79431);color:#07111f}
.dark{background:#07111f;color:white}
.ghost{background:white;color:#07111f}
.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
table{width:100%;border-collapse:collapse;margin-top:12px;background:white}
th,td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}
th{background:#fff4dc;color:#5d4823;text-transform:uppercase;font-size:12px;letter-spacing:1px}
.ok{color:var(--green);font-weight:900}
.bad{color:var(--red);font-weight:900}
.warn{color:var(--orange);font-weight:900}
.details{border-top:1px solid var(--line);padding:18px 0}
.hidden{display:none}
.filters{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;margin:22px 0}
input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fffdf8}
label b{font-size:14px}
@media(max-width:900px){h1{font-size:38px}.grid{grid-template-columns:1fr}.filters{grid-template-columns:1fr}table{font-size:14px}th,td{padding:9px}}
</style>
</head>
<body>
<header><div class="brand">Veyra</div><div class="tag">PILOT INTELLIGENCE</div></header>
<main>
<section class="panel">
<div class="eyebrow">Internal Training Dashboard</div>
<h1>Resultados Training Center</h1>
<p>Panel interno para revisar intentos guardados en Supabase desde el módulo PPA Practice.</p>
<div class="filters">
<label><b>Buscar estudiante</b><input id="searchInput" placeholder="Nombre o curso"></label>
<label><b>Licencia</b><select id="licenseFilter"><option value="PPA">PPA</option><option value="">Todas</option><option value="PCA">PCA</option><option value="A320">A320</option></select></label>
<label><b>Mostrar</b><select id="limitFilter"><option value="20">Últimos 20</option><option value="50">Últimos 50</option><option value="100">Últimos 100</option></select></label>
<button class="gold" onclick="loadAttempts()">Actualizar</button>
</div>
<p id="status">Consultando intentos...</p>
<div class="grid">
<div class="kpi"><small>Intentos</small><b id="kpiAttempts">—</b></div>
<div class="kpi"><small>Promedio</small><b id="kpiAverage">—</b></div>
<div class="kpi"><small>Mejor nota</small><b id="kpiBest">—</b></div>
<div class="kpi"><small>Mayor refuerzo</small><b id="kpiWeak">—</b></div>
</div>
<div class="btns">
<button class="ghost" onclick="location.href='/'">Volver a Veyra</button>
<button class="dark" onclick="location.href='ppa-practice.html'">Abrir PPA Practice</button>
<button class="gold" onclick="exportAttemptsCsv()">Exportar CSV</button>
</div>
</section>
<section class="panel"><h2>Últimos intentos</h2><div id="attemptsTable">Cargando...</div></section>
<section id="detailPanel" class="panel hidden"><h2>Detalle del intento</h2><div id="detailContent"></div></section>
</main>
<script>
const SUPABASE_URL="https://japjyiccjwnhbfpwqtti.supabase.co";
const SUPABASE_KEY="sb_publishable_d0I6KVZFmyxg4EiyRExVNw_HoeDHPOs";
let attempts=[];
function formatDate(value){if(!value)return "";try{return new Date(value).toLocaleString("es-CO",{dateStyle:"short",timeStyle:"short"})}catch(e){return value}}
function esc(value){return String(value??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
async function fetchAttempts(){
 const license=document.getElementById("licenseFilter").value;
 const limit=document.getElementById("limitFilter").value||"20";
 let query="/rest/v1/training_attempts?select=id,student_name,course,license,practice_type,score,correct_count,total_questions,time_used_seconds,level_result,category_summary,failed_questions,answer_detail,created_at&order=created_at.desc&limit="+encodeURIComponent(limit);
 if(license) query+="&license=eq."+encodeURIComponent(license);
 const res=await fetch(SUPABASE_URL+query,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Accept":"application/json"}});
 if(!res.ok){const text=await res.text();throw new Error("HTTP "+res.status+" · "+text)}
 return await res.json();
}
function applySearch(rows){
 const q=document.getElementById("searchInput").value.trim().toLowerCase();
 if(!q)return rows;
 return rows.filter(r=>String(r.student_name||"").toLowerCase().includes(q)||String(r.course||"").toLowerCase().includes(q)||String(r.license||"").toLowerCase().includes(q));
}
function weakestCategory(rows){
 const agg={};
 rows.forEach(r=>{const summary=r.category_summary||{};Object.entries(summary).forEach(([cat,v])=>{agg[cat]??={total:0,correct:0};agg[cat].total+=Number(v.total||0);agg[cat].correct+=Number(v.correct||0);});});
 const scored=Object.entries(agg).filter(([_,v])=>v.total>0).map(([cat,v])=>({cat,score:Math.round((v.correct/v.total)*100)})).sort((a,b)=>a.score-b.score);
 return scored[0]?scored[0].cat+" "+scored[0].score+"%":"—";
}
function updateKpis(rows){
 document.getElementById("kpiAttempts").textContent=rows.length;
 if(!rows.length){document.getElementById("kpiAverage").textContent="—";document.getElementById("kpiBest").textContent="—";document.getElementById("kpiWeak").textContent="—";return}
 const avg=Math.round(rows.reduce((a,r)=>a+Number(r.score||0),0)/rows.length);
 const best=Math.max(...rows.map(r=>Number(r.score||0)));
 document.getElementById("kpiAverage").textContent=avg+"%";
 document.getElementById("kpiBest").textContent=best+"%";
 document.getElementById("kpiWeak").textContent=weakestCategory(rows);
}
function levelClass(level,score){if(Number(score)>=75)return"ok";if(Number(score)>=60)return"warn";return"bad"}
function renderTable(){
 const rows=applySearch(attempts);
 updateKpis(rows);
 if(!rows.length){document.getElementById("attemptsTable").innerHTML="<p>No hay intentos para mostrar.</p>";return}
 document.getElementById("attemptsTable").innerHTML=`<table><thead><tr><th>Fecha</th><th>Estudiante</th><th>Curso</th><th>Licencia</th><th>Nota</th><th>Correctas</th><th>Nivel</th><th>Detalle</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${formatDate(r.created_at)}</td><td>${esc(r.student_name||"Sin nombre")}</td><td>${esc(r.course||"—")}</td><td>${esc(r.license||"—")}</td><td><b>${Number(r.score||0)}%</b></td><td>${Number(r.correct_count||0)}/${Number(r.total_questions||0)}</td><td class="${levelClass(r.level_result,r.score)}">${esc(r.level_result||"—")}</td><td><button class="dark" onclick="showDetail(${r.id})">Ver</button></td></tr>`).join("")}</tbody></table>`;
}
function showDetail(id){
 const r=attempts.find(x=>x.id===id);if(!r)return;
 const summary=r.category_summary||{};
 const failed=Array.isArray(r.failed_questions)?r.failed_questions:[];
 const summaryRows=Object.entries(summary).map(([cat,v])=>`<tr><td>${esc(cat)}</td><td>${Number(v.correct||0)}/${Number(v.total||0)}</td><td>${Number(v.score||0)}%</td></tr>`).join("");
 const failedHtml=failed.length?failed.map(f=>`<div class="details"><div class="eyebrow">${esc(f.id)} · ${esc(f.category)}</div><h3>${esc(f.question)}</h3><p>Marcada: <span class="bad">${esc(f.marked||"Sin respuesta")}</span> · Correcta: <span class="ok">${esc(f.correct)}</span></p><p><b>Retroalimentación:</b> ${esc(f.explanation||"")}</p></div>`).join(""):'<p class="ok">No hubo preguntas falladas.</p>';
 document.getElementById("detailPanel").classList.remove("hidden");
 document.getElementById("detailContent").innerHTML=`<p><b>Estudiante:</b> ${esc(r.student_name||"Sin nombre")} · <b>Curso:</b> ${esc(r.course||"—")} · <b>Fecha:</b> ${formatDate(r.created_at)}</p><div class="grid"><div class="kpi"><small>Nota</small><b>${Number(r.score||0)}%</b></div><div class="kpi"><small>Correctas</small><b>${Number(r.correct_count||0)}/${Number(r.total_questions||0)}</b></div><div class="kpi"><small>Nivel</small><b>${esc(r.level_result||"—")}</b></div><div class="kpi"><small>Tiempo</small><b>${Math.round(Number(r.time_used_seconds||0)/60)} min</b></div></div><h2>Desempeño por materia</h2><table><thead><tr><th>Materia</th><th>Correctas</th><th>Resultado</th></tr></thead><tbody>${summaryRows}</tbody></table><h2 style="margin-top:28px">Preguntas falladas</h2>${failedHtml}`;
 document.getElementById("detailPanel").scrollIntoView({behavior:"smooth"});
}

function csvCell(value){
 const text=String(value??"").replace(/"/g,'""');
 return '"' + text + '"';
}
function exportAttemptsCsv(){
 const rows=applySearch(attempts);
 if(!rows.length){alert("No hay intentos para exportar.");return;}
 const headers=["Fecha","Estudiante","Curso","Licencia","Tipo","Nota","Correctas","Total","Tiempo segundos","Nivel","Mayor refuerzo"];
 const lines=[headers.map(csvCell).join(",")];
 rows.forEach(r=>{
   const weak=weakestCategory([r]);
   lines.push([
     formatDate(r.created_at),
     r.student_name||"",
     r.course||"",
     r.license||"",
     r.practice_type||"",
     Number(r.score||0)+"%",
     Number(r.correct_count||0),
     Number(r.total_questions||0),
     Number(r.time_used_seconds||0),
     r.level_result||"",
     weak
   ].map(csvCell).join(","));
 });
 const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 const date=new Date().toISOString().slice(0,10);
 a.href=url;
 a.download="veyra_training_attempts_"+date+".csv";
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 URL.revokeObjectURL(url);
}

async function loadAttempts(){
 const status=document.getElementById("status");status.innerHTML="Consultando Supabase...";
 try{attempts=await fetchAttempts();status.innerHTML='<span class="ok">Intentos cargados correctamente: '+attempts.length+'</span>';renderTable();}
 catch(e){status.innerHTML='<span class="bad">No se pudieron cargar los intentos.</span><br><small>'+esc(e.message)+'</small>';document.getElementById("attemptsTable").innerHTML="<p>Error al cargar datos.</p>";}
}
document.getElementById("searchInput").addEventListener("input",renderTable);
document.getElementById("licenseFilter").addEventListener("change",loadAttempts);
document.getElementById("limitFilter").addEventListener("change",loadAttempts);
loadAttempts();
</script>
</body>

<!-- Veyra training-dashboard v1.1 CSV export -->
</html>
